<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriviArt - Classe Prima</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden; 
        }
        
        /* SCHERMATA INIZIALE */
        #schermata-iniziale h1 {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 5px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        #schermata-iniziale h2 {
            color: #7f8c8d;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        /* LEGENDA ARGOMENTI INIZIALE */
        .titolo-legenda {
            font-size: 1em;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .legenda-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .badge-categoria {
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Colori dei badge per la legenda */
        .bg-marrone { background-color: #8d6e63; }
        .bg-giallo { background-color: #f1c40f; }
        .bg-verde { background-color: #2ecc71; }
        .bg-blu { background-color: #3498db; }
        .bg-arancione { background-color: #e67e22; }
        .bg-rosso { background-color: #e74c3c; }

        .selettore-squadre {
            margin: 20px 0;
            font-size: 1.1em;
        }
        .selettore-squadre select {
            font-size: 1em;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .btn-inizia {
            background-color: #e74c3c;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-inizia:hover { background-color: #c0392b; }

        /* TABELLONE PUNTEGGI */
        #tabellone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #bdc3c7;
        }
        .squadra-score {
            background-color: #ecf0f1;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .squadra-attiva {
            background-color: #f1c40f; 
            color: #000;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* GIOCO */
        #quiz-container { display: none; padding-top: 0; }
        
        #indicatore-turno {
            font-size: 1.1em;
            color: #7f8c8d;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }

        /* STILE DEL TIMER */
        #timer-container {
            font-size: 1.2em;
            font-weight: bold;
            color: #c0392b;
            margin: 10px 0 20px 0;
            padding: 5px 15px;
            background-color: #f9ebea;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #f5b7b1;
        }
        
        #argomento-titolo {
            font-size: 1.2em;
            margin: 0 -30px 20px -30px; 
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3); 
            transition: background-color 0.3s;
        }
        
        #testo-domanda {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        /* PULSANTI E FEEDBACK */
        .btn-opzione {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-opzione:hover { 
            background-color: #e0e6ed; 
            border-color: #95a5a6;
        }
        .btn-opzione:disabled {
            background-color: #ecf0f1;
            border-color: #ecf0f1;
            cursor: not-allowed;
            color: #95a5a6;
        }
        #feedback {
            margin-top: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            display: none;
            white-space: pre-line; 
        }
        .corretto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .errato { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        #btn-avanti {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }
        #btn-avanti:hover { background-color: #1a252f; }
    </style>
</head>
<body>

    <div id="schermata-iniziale" class="container">
        <h1>Prof. Marco Cigolotti</h1>
        <h2>TriviArt - Classe 1</h2>
        
        <div class="titolo-legenda">Il percorso nel tempo:</div>
        <div class="legenda-container">
            <div class="badge-categoria bg-marrone">1. Preistoria</div>
            <div class="badge-categoria bg-giallo">2. Mesopotamia</div>
            <div class="badge-categoria bg-verde">3. Arte Egizia</div>
            <div class="badge-categoria bg-blu">4. Creta e Micene</div>
            <div class="badge-categoria bg-arancione">5. Arte Greca</div>
            <div class="badge-categoria bg-rosso">6. Arte Romana</div>
        </div>
        
        <div class="selettore-squadre">
            <label for="numero-squadre">Numero di squadre:</label>
            <select id="numero-squadre">
                <option value="2">2 Squadre</option>
                <option value="3">3 Squadre</option>
                <option value="4">4 Squadre</option>
                <option value="5">5 Squadre</option>
                <option value="6">6 Squadre</option>
            </select>
        </div>
        
        <button class="btn-inizia" onclick="iniziaGioco()">Inizia la Partita</button>
    </div>

    <div id="quiz-container" class="container">
        
        <h2 id="argomento-titolo">Argomento</h2>
        
        <div id="tabellone"></div>
        <div id="indicatore-turno">Tocca alla Squadra X</div>
        
        <div id="timer-container">Tempo rimasto: <span id="countdown">60</span>s</div>

        <h3 id="testo-domanda">Caricamento domanda...</h3>
        
        <div id="pulsanti-opzioni"></div>
        <div id="feedback"></div>
        
        <button id="btn-avanti" onclick="prossimoTurno()">Prossima Domanda ➔</button>
    </div>

    <script>
        const codiciColori = {
            "marrone": "#8d6e63",
            "giallo": "#f1c40f",
            "verde": "#2ecc71",
            "blu": "#3498db",
            "arancione": "#e67e22",
            "rosso": "#e74c3c"
        };

        const databaseDomande = [
            // --- 1. PREISTORIA (15 domande) ---
            { argomento: "Preistoria", colore: "marrone", domanda: "Qual era la funzione principale delle pitture rupestri realizzate all'interno delle caverne?", opzioni: ["Decorare l'ambiente", "Scopi magico-propiziatori per la caccia", "Insegnare a scrivere", "Registrare i cambiamenti climatici"], rispostaCorretta: 1, spiegazione: "Gli uomini preistorici dipingevano gli animali sperando di 'catturarne' l'essenza per favorire la caccia." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Quali pigmenti naturali venivano usati principalmente nella preistoria?", opzioni: ["Acrilici e tempere", "Terre, ocre e carbone", "Colori a olio", "Smalto sintetico"], rispostaCorretta: 1, spiegazione: "Utilizzavano minerali tritati (come l'ocra) e carbone, mescolati con grasso animale o saliva." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Cosa rappresentano le cosiddette 'Veneri preistoriche' (come la Venere di Willendorf)?", opzioni: ["La dea della bellezza", "La fertilità della donna e della terra", "Una regina del villaggio", "Una guerriera"], rispostaCorretta: 1, spiegazione: "Le forme esagerate (seno, ventre) simboleggiavano l'abbondanza, la fertilità e la continuazione della specie." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Che cos'è un Menhir?", opzioni: ["Una tomba sotterranea", "Un villaggio sull'acqua", "Una singola grande pietra conficcata verticalmente nel terreno", "Un tempio a gradoni"], rispostaCorretta: 2, spiegazione: "Il Menhir è la struttura megalitica più semplice, spesso usata per indicare luoghi sacri o sepolture." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Come si chiamano le abitazioni preistoriche costruite su pali di legno infissi sul fondo di laghi o paludi?", opzioni: ["Domus", "Nuraghi", "Ziggurat", "Palafitte"], rispostaCorretta: 3, spiegazione: "Le palafitte servivano a proteggere i villaggi dagli animali feroci e a facilitare la pesca." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Quali sono i tre grandi periodi in cui gli studiosi dividono l'Età della Pietra?", opzioni: ["Arcaico, Classico ed Ellenistico", "Paleolitico, Mesolitico e Neolitico", "Antico, Medio e Recente", "Pre-dinastico, Antico Regno e Nuovo Regno"], rispostaCorretta: 1, spiegazione: "Questi termini derivano dal greco e significano età della pietra antica (Paleolitico), di mezzo (Mesolitico) e nuova (Neolitico)." },
            { argomento: "Preistoria", colore: "marrone", domanda: "In quale nazione europea si trova la grotta di Lascaux, celebre per i suoi incredibili dipinti di animali?", opzioni: ["Italia", "Spagna", "Francia", "Germania"], rispostaCorretta: 2, spiegazione: "Lascaux si trova in Francia ed è spesso definita la 'Cappella Sistina della Preistoria' per la ricchezza dei suoi affreschi." },
            { argomento: "Preistoria", colore: "marrone", domanda: "In quale nazione si trova invece la grotta di Altamira, famosa per i bisonti dipinti sul soffitto?", opzioni: ["Spagna", "Inghilterra", "Grecia", "Portogallo"], rispostaCorretta: 0, spiegazione: "Altamira si trova nel nord della Spagna ed è stata una delle prime grotte preistoriche dipinte ad essere scoperta." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Che cos'è un Dolmen?", opzioni: ["Un'arma da caccia", "Una collana di conchiglie", "Due pietre verticali sormontate da una grande lastra orizzontale", "Una statuetta femminile"], rispostaCorretta: 2, spiegazione: "Il Dolmen (dal bretone 'tavola di pietra') era usato principalmente come monumento funerario collettivo." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Come si chiama un monumento megalitico formato da pietre disposte in cerchio, come il famoso Stonehenge?", opzioni: ["Mastaba", "Cromlech", "Ziqqurat", "Agorà"], rispostaCorretta: 1, spiegazione: "Il Cromlech era probabilmente un luogo sacro legato a culti solari o un antico osservatorio astronomico." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Quale evento storico ed epocale segna convenzionalmente la fine della Preistoria?", opzioni: ["L'invenzione della ruota", "La scoperta dell'America", "L'invenzione della scrittura", "L'inizio delle ere glaciali"], rispostaCorretta: 2, spiegazione: "Con la scrittura (intorno al 3000 a.C.) l'uomo inizia a lasciare testimonianze e documenti storici decifrabili." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Quale tecnica usavano gli uomini primitivi per realizzare i graffiti sulle pareti rocciose?", opzioni: ["Dipingevano con le dita", "Incidevano la roccia scalfendola con pietre più dure", "Usavano scalpelli di ferro", "Bruciavano la parete con il fuoco"], rispostaCorretta: 1, spiegazione: "Il graffito si ottiene asportando materiale, scavando un solco nella pietra (spesso con l'uso della selce)." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Quale pietra, per la sua durezza e capacità di scheggiarsi in lame taglienti, era la più usata per armi e utensili?", opzioni: ["Il marmo", "Il granito", "La selce", "Il tufo"], rispostaCorretta: 2, spiegazione: "Lavorando la selce si ottenevano i 'chopper' e le 'amigdale', strumenti fondamentali per la sopravvivenza." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Come si chiamano le antiche e misteriose torri di pietra a forma di tronco di cono, tipiche della Sardegna?", opzioni: ["Trulli", "Nuraghi", "Ziggurat", "Piramidi"], rispostaCorretta: 1, spiegazione: "I Nuraghi sono costruzioni megalitiche realizzate con grandi blocchi di pietra sovrapposti a secco (senza cemento)." },
            { argomento: "Preistoria", colore: "marrone", domanda: "Nelle pitture rupestri, come si realizzava spesso l'effetto 'in negativo' delle mani?", opzioni: ["Appoggiando la mano sporca di colore sulla parete", "Spruzzando il colore con la bocca attorno alla mano appoggiata alla roccia", "Scolpendo la roccia a forma di mano", "Usando uno stampo di legno"], rispostaCorretta: 1, spiegazione: "Questa tecnica, detta aerografia preistorica, lasciava l'impronta chiara della mano circondata dall'alone di colore." },

            // --- 2. MESOPOTAMIA (15 domande) ---
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Come si chiama la grande torre a gradoni tipica delle città sumere e babilonesi?", opzioni: ["Piramide", "Nuraghe", "Ziggurat", "Partenone"], rispostaCorretta: 2, spiegazione: "La Ziggurat era il centro religioso e magazzino della città; sulla sua sommità si trovava il tempio." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Con quale materiale i popoli mesopotamici costruivano i loro imponenti edifici?", opzioni: ["Grandi blocchi di marmo", "Mattoni di argilla (crudi o cotti)", "Cemento armato", "Legno di quercia"], rispostaCorretta: 1, spiegazione: "La Mesopotamia scarseggiava di pietra e legname, quindi sfruttavano l'argilla dei fiumi per creare i mattoni." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Cosa raffigura lo 'Stendardo di Ur'?", opzioni: ["Scene di pace e scene di guerra", "La mappa della città", "Il mito della creazione", "I pianeti del sistema solare"], rispostaCorretta: 0, spiegazione: "È un pannello in legno decorato con lapislazzuli e conchiglie che mostra i due aspetti principali della vita sumera." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Chi sono i Lamassu, posti a guardia dei palazzi assiri?", opzioni: ["Sacerdoti guerrieri", "Mostri marini", "Tori alati androcefali (con testa umana)", "Leoni di bronzo"], rispostaCorretta: 2, spiegazione: "Avevano funzione apotropaica (per tenere lontano il male) e mostravano la potenza invincibile del sovrano." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Di che colore era la splendida Porta di Ishtar a Babilonia?", opzioni: ["Bianca", "Rossa", "Blu brillante (per i mattoni smaltati)", "Oro massiccio"], rispostaCorretta: 2, spiegazione: "Era rivestita di mattoni smaltati color lapislazzuli, decorati con draghi e tori in rilievo." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Cosa significa letteralmente la parola 'Mesopotamia'?", opzioni: ["Terra del sole", "Terra in mezzo ai fiumi", "Montagna sacra", "Regno dei re"], rispostaCorretta: 1, spiegazione: "Deriva dal greco 'mésos' (in mezzo) e 'potamós' (fiume). Si riferisce al territorio tra il Tigri e l'Eufrate." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Quali sono i due grandi fiumi che bagnavano la Mesopotamia?", opzioni: ["Nilo e Gange", "Indo e Giallo", "Tigri ed Eufrate", "Tevere e Po"], rispostaCorretta: 2, spiegazione: "Questi due fiumi rendevano fertile la terra e fornivano l'argilla, fondamentale per l'arte e l'architettura mesopotamica." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale tipo di scrittura inventarono i Sumeri, incidendo tavolette di argilla fresca con uno stilo?", opzioni: ["Geroglifica", "Alfabetica", "Cuneiforme", "Lineare A"], rispostaCorretta: 2, spiegazione: "Si chiama cuneiforme perché i segni lasciati dallo stilo sull'argilla avevano la forma di piccoli chiodi o cunei." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Che cos'è la famosa Stele di Hammurabi?", opzioni: ["Una statua del dio Sole", "Un blocco di pietra nero su cui è inciso uno dei più antichi codici di leggi", "Una mappa militare", "Un altare per i sacrifici"], rispostaCorretta: 1, spiegazione: "Contiene le leggi del re babilonese Hammurabi (es. la legge del taglione: occhio per occhio, dente per dente)." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale leggendaria meraviglia del mondo antico si trovava a Babilonia?", opzioni: ["Il Colosso", "Il Faro", "La grande Piramide", "I Giardini Pensili"], rispostaCorretta: 3, spiegazione: "Fatti costruire, secondo la leggenda, dal re Nabucodonosor II, erano un capolavoro di ingegneria e idraulica." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale piccolo oggetto usavano i mesopotamici per 'firmare' i documenti o sigillare le merci rotolandolo sull'argilla?", opzioni: ["Un anello d'oro", "Un sigillo cilindrico", "Una moneta di rame", "Un timbro di legno"], rispostaCorretta: 1, spiegazione: "Rotolandolo sull'argilla fresca, il sigillo lasciava impresso un piccolo rilievo continuo con scene religiose o di vita quotidiana." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Nei bellissimi bassorilievi dei palazzi Assiri (come a Ninive), quali erano i due temi più rappresentati?", opzioni: ["L'agricoltura e la pesca", "La vita degli dèi e i miti", "La guerra e la caccia al leone", "Il commercio e le feste"], rispostaCorretta: 2, spiegazione: "Gli Assiri erano un popolo bellicoso; i rilievi servivano per terrorizzare i nemici ed esaltare la forza del re." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Di che materiale era fatta la statua del governatore sumero Gudea di Lagash?", opzioni: ["Diorite, una pietra scura e durissima", "Legno di cedro", "Terracotta dipinta", "Oro e argento"], rispostaCorretta: 0, spiegazione: "L'uso della diorite (difficile da scolpire) serviva a rendere la statua indistruttibile, sfidando il tempo e l'usura." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "In architettura, quale elemento tecnico fu perfezionato e usato ampiamente in Mesopotamia prima ancora che dai Romani?", opzioni: ["La cupola a bulbo", "L'arco a tutto sesto e la volta in mattoni", "Il colonnato di marmo", "La capriata in legno"], rispostaCorretta: 1, spiegazione: "Mancando lunghi tronchi di legno o grandi pietre per fare architravi, i mesopotamici usarono i mattoni per costruire archi e coprire gli spazi." },
            { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale fondamentale invenzione, che rivoluzionò i trasporti e l'agricoltura, è attribuita ai Sumeri?", opzioni: ["La bussola", "La ruota", "L'aratro di ferro", "La sella per i cavalli"], rispostaCorretta: 1, spiegazione: "Inizialmente usata come tornio per la ceramica, la ruota venne poi applicata ai carri, cambiando per sempre la storia." },

            // --- 3. ARTE EGIZIA (15 domande) ---
            { argomento: "Arte Egizia", colore: "verde", domanda: "Nella pittura egizia, come venivano rappresentate le figure umane secondo la 'legge della frontalità'?", opzioni: ["Totalmente di profilo", "Totalmente di fronte", "Volto e gambe di profilo, occhio e busto di fronte", "In prospettiva tridimensionale"], rispostaCorretta: 2, spiegazione: "Questa convenzione serviva a mostrare ogni parte del corpo dal suo angolo più chiaro e riconoscibile." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Qual era lo scopo principale delle Piramidi?", opzioni: ["Osservatori astronomici", "Monumenti funerari (tombe) per i Faraoni", "Palazzi residenziali", "Granai per i periodi di carestia"], rispostaCorretta: 1, spiegazione: "Le piramidi proteggevano il corpo mummificato del sovrano e il suo immenso corredo per l'aldilà." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Quali edifici funebri a forma di tronco di piramide precedettero la costruzione delle grandi piramidi?", opzioni: ["Mastabe", "Ziggurat", "Dolmen", "Catacombe"], rispostaCorretta: 0, spiegazione: "Le mastabe erano tombe a gradone unico; sovrapponendo più mastabe nacque la prima piramide a gradoni di Djoser." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Come si chiama la scrittura egizia basata su simboli e immagini?", opzioni: ["Cuneiforme", "Lineare B", "Geroglifica", "Alfabetica"], rispostaCorretta: 2, spiegazione: "I geroglifici ('incisioni sacre') venivano scolpiti sui templi o dipinti sui fogli di papiro." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Come venivano differenziati gli uomini e le donne nella pittura egizia in base al colore?", opzioni: ["Uomini carnagione scura/rossiccia, donne carnagione chiara/giallognola", "Uomini blu, donne verdi", "Uomini in bianco e nero, donne a colori", "Non c'era differenza"], rispostaCorretta: 0, spiegazione: "Era una convenzione: gli uomini lavoravano spesso all'aperto sotto il sole, le donne curavano la casa." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Chi è raffigurato nella celebre e gigantesca scultura della Sfinge a Giza?", opzioni: ["Un leone con la testa di un faraone", "Un cane a guardia delle piramidi", "Un dio con la testa di sciacallo", "Un cavallo alato"], rispostaCorretta: 0, spiegazione: "La Sfinge (probabilmente col volto del faraone Chefren) simboleggiava forza e intelligenza a guardia del complesso funerario." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Quale importante scoperta permise agli studiosi moderni di tradurre finalmente i geroglifici?", opzioni: ["Il tesoro di Tutankhamon", "La Stele di Rosetta", "I rotoli del Mar Morto", "Il Codice di Hammurabi"], rispostaCorretta: 1, spiegazione: "La Stele di Rosetta riportava lo stesso testo in geroglifico, demotico e greco antico, permettendo il confronto." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Che cos'erano i 'vasi canopi' trovati nelle tombe egizie?", opzioni: ["Contenitori per l'acqua e il vino", "Urne in cui si conservavano gli organi interni del defunto", "Vasi usati per coltivare il grano", "Recipienti per i profumi"], rispostaCorretta: 1, spiegazione: "Durante la mummificazione, polmoni, fegato, stomaco e intestini venivano estratti e conservati nei vasi canopi." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Nei templi egizi, come si chiamavano le grandi colonne i cui capitelli imitavano la forma di piante locali?", opzioni: ["Doriche e ioniche", "Papiriformi e lotiformi", "Aspirali", "Scanalate"], rispostaCorretta: 1, spiegazione: "Prendevano ispirazione dalle piante di papiro e di loto, simbolo rispettivamente del Basso e dell'Alto Egitto." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Come venivano rappresentati gli schiavi o i nemici rispetto al Faraone nelle pitture e nei rilievi?", opzioni: ["Della stessa dimensione", "Più grandi e spaventosi", "Molto più piccoli", "Invisibili"], rispostaCorretta: 2, spiegazione: "Nell'arte egizia le dimensioni dipendevano dall'importanza sociale (proporzione gerarchica): il Faraone era sempre il gigante della scena." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Cos'è la Valle dei Re?", opzioni: ["Una grande piramide", "Un fiume vicino al Nilo", "Una gola nascosta tra le montagne usata come cimitero sotterraneo per i faraoni", "Il palazzo reale di Tebe"], rispostaCorretta: 2, spiegazione: "Nel Nuovo Regno, per evitare i saccheggi, i faraoni smisero di costruire piramidi e scavarono tombe nascoste nella roccia." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Di quale famoso faraone fu ritrovata la tomba praticamente intatta nel 1922 da Howard Carter?", opzioni: ["Ramses II", "Cheope", "Tutankhamon", "Akhenaton"], rispostaCorretta: 2, spiegazione: "La tomba conteneva un tesoro inestimabile, tra cui la celebre maschera funeraria in oro massiccio e lapislazzuli." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Cosa raffiguravano solitamente i lunghi papiri noti come 'Libro dei Morti'?", opzioni: ["Le tasse da pagare", "Mappe militari", "Preghiere e formule magiche per aiutare il defunto nel viaggio verso l'aldilà", "Ricette mediche"], rispostaCorretta: 2, spiegazione: "Erano veri e propri 'manuali di sopravvivenza' spirituale, spesso accompagnati da illustrazioni del giudizio divino (la pesatura del cuore)." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Che cos'è un Obelisco?", opzioni: ["Una barca sacra", "Un alto monumento di pietra a base quadrata che termina con una piccola piramide", "Una statua di divinità animale", "Un labirinto sotterraneo"], rispostaCorretta: 1, spiegazione: "Scolpito in un unico blocco di granito (monolito), rappresentava un raggio di sole pietrificato ed era dedicato al dio Ra." },
            { argomento: "Arte Egizia", colore: "verde", domanda: "Quale faraone tentò di rivoluzionare l'arte e la religione introducendo il culto di un solo dio (Aton, il disco solare)?", opzioni: ["Djoser", "Tutankhamon", "Cleopatra", "Akhenaton (Amenofi IV)"], rispostaCorretta: 3, spiegazione: "Durante il periodo di Amarna, anche l'arte cambiò, diventando più realistica, affettuosa e meno rigida." },

            // --- 4. CRETA E MICENE (15 domande) ---
            { argomento: "Creta e Micene", colore: "blu", domanda: "Nel famoso affresco a Cnosso, in cosa consisteva il 'Gioco del Toro' (Tauromachia)?", opzioni: ["Uccidere il toro con una spada", "Cavalcare il toro come in un rodeo", "Fare acrobazie e capriole sul dorso del toro in corsa", "Inseguire il toro in un labirinto"], rispostaCorretta: 2, spiegazione: "Era un rito in cui i giovani (ragazzi e ragazze) mostravano agilità saltando l'animale senza fargli del male." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Qual è la differenza principale tra i palazzi cretesi (es. Cnosso) e quelli micenei (es. Micene)?", opzioni: ["I cretesi sono di legno, i micenei di marmo", "I cretesi sono aperti e senza mura, i micenei sono roccaforti cinte da mura ciclopiche", "I cretesi sono sottoterra, i micenei su torri", "Non c'è nessuna differenza"], rispostaCorretta: 1, spiegazione: "Creta era pacifica e protetta dal mare. Micene era una civiltà guerriera e temeva le invasioni." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Come è chiamata la famosa porta monumentale che dà accesso alla città di Micene?", opzioni: ["Porta di Ishtar", "Porta dei Leoni", "Porta d'Oro", "Porta degli Dèi"], rispostaCorretta: 1, spiegazione: "L'architrave è sovrastato da un triangolo di scarico con due leonesse scolpite, simbolo di forza e protezione." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Nella ceramica cretese, cosa rappresenta lo 'Stile Marino'?", opzioni: ["Navi da guerra in battaglia", "Pescatori sulle barche", "Creature del mare come polpi, delfini e stelle marine", "Divinità greche del mare"], rispostaCorretta: 2, spiegazione: "I cretesi erano un popolo di navigatori e amavano decorare i vasi con elementi naturali e fluidi che si adattavano alla forma del vaso." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Che forma ha la pianta della cosiddetta Tomba di Agamennone (o Tesoro di Atreo)?", opzioni: ["Rettangolare", "A piramide", "Circolare (a Tholos) con cupola ad anelli", "A croce"], rispostaCorretta: 2, spiegazione: "È una monumentale tomba a camera circolare sotterranea, coperta da una finta cupola costruita a filari sporgenti." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Quale animale mitologico si diceva fosse rinchiuso nel labirinto del palazzo di Cnosso?", opzioni: ["Il Pegaso", "L'Idra", "Il Minotauro", "Il Ciclope"], rispostaCorretta: 2, spiegazione: "Il mito del Minotauro (metà uomo e metà toro) nasce probabilmente dall'intricata e immensa pianta del palazzo di Cnosso." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Quale di queste antiche scritture cretesi NON è ancora stata decifrata dagli storici?", opzioni: ["Lineare A", "Lineare B", "Geroglifico", "Alfabeto fenicio"], rispostaCorretta: 0, spiegazione: "La Lineare B è stata decifrata e riconosciuta come greco antico, mentre la Lineare A rimane un mistero." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Con quale prezioso materiale è realizzata la famosa 'Maschera di Agamennone' trovata a Micene?", opzioni: ["Bronzo", "Argento", "Oro sbalzato", "Ferro dolce"], rispostaCorretta: 2, spiegazione: "Questa maschera funeraria veniva appoggiata sul volto del defunto regale ed è lavorata a sbalzo spingendo il metallo dal retro." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Come si chiama la grande sala del trono col focolare centrale tipica dei palazzi micenei?", opzioni: ["Domus", "Megaron", "Agorà", "Ziggurat"], rispostaCorretta: 1, spiegazione: "Il Megaron era il cuore del palazzo miceneo e la sua struttura ispirerà la forma dei successivi templi greci." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Quali erano i soggetti preferiti negli affreschi dei palazzi cretesi?", opzioni: ["Battaglie e soldati", "Scene cupe e spaventose", "Natura gioiosa, animali, processioni e giochi sportivi", "Costellazioni e pianeti"], rispostaCorretta: 2, spiegazione: "L'arte cretese è vivace, pacifica e molto legata all'osservazione della natura e della vita di corte." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "In base alla mitologia, chi aiutò l'eroe Teseo a uscire dal Labirinto di Creta?", opzioni: ["Zeus con un fulmine", "Arianna con un filo", "Dedalo con delle ali", "Poseidone con un tridente"], rispostaCorretta: 1, spiegazione: "Arianna gli diede un gomitolo di filo da srotolare per ritrovare l'uscita dopo aver ucciso il Minotauro." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Come si chiama lo stile ceramico cretese caratterizzato da colori brillanti (bianco, giallo, rosso) su fondo nero opaco, con motivi geometrici?", opzioni: ["Stile Marino", "Stile di Kamares", "Stile a figure rosse", "Stile Dorico"], rispostaCorretta: 1, spiegazione: "Prende il nome dalla grotta sul monte Ida dove furono ritrovati questi finissimi vasi, usati probabilmente per le cerimonie." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Quale mitico evento letterario racconta lo scontro finale della civiltà micenea contro una potente città asiatica?", opzioni: ["Le guerre puniche", "La guerra di Troia", "La battaglia di Maratona", "L'invasione dell'Egitto"], rispostaCorretta: 1, spiegazione: "Narrata nell'Iliade di Omero, la guerra di Troia riflette le reali espansioni commerciali e militari dei Micenei." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Quale materiale i Micenei padroneggiavano a tal punto da creare splendide armi e armature intarsiate?", opzioni: ["L'acciaio inossidabile", "Il bronzo", "Il titanio", "L'ottone"], rispostaCorretta: 1, spiegazione: "Siamo nell'Età del Bronzo, e i Micenei erano abilissimi fabbri e orafi." },
            { argomento: "Creta e Micene", colore: "blu", domanda: "Come apparivano i muri interni del Palazzo di Cnosso?", opzioni: ["Di pura pietra bianca", "Rivestiti di legno grezzo", "Intonacati e riccamente affrescati", "Di mattoni nudi"], rispostaCorretta: 2, spiegazione: "Gli ambienti erano luminosi e coloratissimi, ricoperti di intonaco su cui venivano dipinte scene vivaci (es. l'affresco dei delfini)." },

            // --- 5. ARTE GRECA (15 domande) ---
            { argomento: "Arte Greca", colore: "arancione", domanda: "Quali sono i tre principali ordini architettonici dei templi greci?", opzioni: ["Romano, Gotico e Rinascimentale", "Dorico, Ionico e Corinzio", "Liscio, Scanalato e Decorato", "Arcaico, Classico ed Ellenistico"], rispostaCorretta: 1, spiegazione: "Il Dorico è massiccio (senza base), lo Ionico è elegante (capitello a volute) e il Corinzio è ricco (foglie d'acanto)." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Come si chiamano le statue greche di epoca arcaica che raffigurano giovani uomini nudi in posizione stante?", opzioni: ["Kouroi", "Cariatidi", "Telamoni", "Discoboli"], rispostaCorretta: 0, spiegazione: "Il 'Kouros' rappresenta il giovane uomo ideale, mentre la figura femminile vestita è la 'Kore'." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Cosa stabilì lo scultore Policleto con il suo 'Canone' (applicato nel Doriforo)?", opzioni: ["I colori esatti da usare per i dipinti", "Le regole matematiche per le proporzioni perfette del corpo umano", "Il prezzo delle sculture in bronzo", "Le regole per costruire i templi"], rispostaCorretta: 1, spiegazione: "Secondo il Canone, il corpo perfetto doveva essere proporzionato: l'altezza totale doveva essere 8 volte la testa." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Che cos'è l'Acropoli in una polis greca?", opzioni: ["La piazza del mercato", "Il porto commerciale", "La parte più alta e sacra della città, dedicata agli dèi", "Il teatro all'aperto"], rispostaCorretta: 2, spiegazione: "L'Acropoli (es. quella di Atene con il Partenone) ospitava i templi principali ed era il cuore religioso della polis." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Quali due tecniche di decorazione caratterizzano la ceramica greca?", opzioni: ["Acquarello e tempera", "Figure nere su fondo rosso e figure rosse su fondo nero", "Mosaico e affresco", "Incisione su vetro"], rispostaCorretta: 1, spiegazione: "Con la tecnica a figure rosse, introdotta in seguito, i dettagli non venivano più incisi ma dipinti con un pennello fine, permettendo un maggiore realismo." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "In un tempio greco, come si chiama la stanza interna accessibile solo ai sacerdoti, che custodiva la statua del dio?", opzioni: ["Pronaos", "Peristilio", "Naos (o Cella)", "Timpano"], rispostaCorretta: 2, spiegazione: "Il Naos era la vera e propria 'casa' della divinità e non era un luogo di riunione per i fedeli (le cerimonie si svolgevano all'esterno)." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Come venivano bilanciati il peso e la postura nelle sculture greche classiche (come nel Doriforo)?", opzioni: ["Mettendo la statua seduta", "Con la posizione del 'chiasmo' (incrocio di arti in tensione e a riposo)", "Usando braccia lunghissime", "Nascondendo le gambe in una veste"], rispostaCorretta: 1, spiegazione: "Il chiasmo conferisce alla statua un equilibrio dinamico e naturale: se il braccio destro è teso, la gamba sinistra è a riposo, e viceversa." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Chi fu l'architetto scultore a cui Pericle affidò la decorazione del Partenone?", opzioni: ["Mirone", "Policleto", "Fidia", "Prassitele"], rispostaCorretta: 2, spiegazione: "Fidia realizzò le immense sculture in oro e avorio di Atena e Zeus e supervisionò tutte le decorazioni dell'Acropoli." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Di che colore erano originariamente i templi e le statue greche di marmo bianco che vediamo oggi?", opzioni: ["Sempre bianchi", "Grigiastri", "Dipinti con colori vivaci e accesi (rosso, blu, oro)", "Neri"], rispostaCorretta: 2, spiegazione: "I greci amavano la policromia: il marmo bianco era in gran parte coperto da colori per far risaltare i dettagli e rendere le figure più reali." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Cosa raffigura la celebre statua del 'Discobolo' di Mirone?", opzioni: ["Un dio addormentato", "Un atleta nel momento di massima tensione prima di lanciare il disco", "Un soldato ferito", "Un politico che fa un discorso"], rispostaCorretta: 1, spiegazione: "Mirone cattura l'attimo fuggente di massimo squilibrio ed energia, unendo realismo anatomico e forma geometrica perfetta." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Quale elemento del teatro greco è l'area circolare dove agiva il coro?", opzioni: ["La Càvea", "L'Orchestra", "La Scena", "Il Pronaos"], rispostaCorretta: 1, spiegazione: "L'orchestra greca non era per i musicisti moderni, ma lo spazio centrale battuto dove il coro danzava e cantava." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Quali famosissime sculture in bronzo, ritrovate in mare in Calabria, mostrano l'incredibile abilità greca del periodo classico?", opzioni: ["I Cavalli di San Marco", "I Bronzi di Riace", "Il Colosso di Rodi", "La Lupa Capitolina"], rispostaCorretta: 1, spiegazione: "Ritrovati nel 1972, sono tra i pochissimi originali in bronzo sopravvissuti, famosi per il realismo muscolare e i dettagli in argento e rame." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Come si chiamano le colonne a forma di figura femminile che sostengono il tetto del tempio dell'Eretteo?", opzioni: ["Kouroi", "Cariatidi", "Metope", "Triglifi"], rispostaCorretta: 1, spiegazione: "Le Cariatidi sostituiscono le colonne; con la loro posa elegante sembrano reggere l'architrave senza alcuno sforzo." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Nel tempio dorico, come è composto il fregio sopra l'architrave?", opzioni: ["Da una scultura unica e continua", "Dall'alternanza di Metope (pannelli scolpiti) e Triglifi (pannelli con scanalature)", "Da mattoni smaltati", "È completamente liscio e vuoto"], rispostaCorretta: 1, spiegazione: "Questa alternanza crea un forte ritmo visivo tipico della severità e dell'ordine dell'architettura dorica." },
            { argomento: "Arte Greca", colore: "arancione", domanda: "Cosa caratterizza l'arte del periodo Ellenistico (es. il Gruppo del Laocoonte)?", opzioni: ["Figure piatte e rigide", "Volti inespressivi e sorrisi lievi", "Grande dinamismo, tensione muscolare e forte espressione di sentimenti (dolore, fatica)", "Uso esclusivo del legno"], rispostaCorretta: 2, spiegazione: "L'Ellenismo abbandona la calma perfetta del periodo Classico per mostrare l'emozione, il dramma e il movimento violento." },

            // --- 6. ARTE ROMANA (15 domande) ---
            { argomento: "Arte Romana", colore: "rosso", domanda: "Quale elemento architettonico curvo è stato perfezionato e usato massicciamente dai Romani per acquedotti e ponti?", opzioni: ["L'architrave", "L'arco a tutto sesto", "Il tetto spiovente", "Il trilite"], rispostaCorretta: 1, spiegazione: "L'arco distribuisce il peso sui piloni laterali grazie alla 'chiave di volta', permettendo di creare grandi aperture." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Quale tecnica usavano i Romani per decorare le pareti in modo duraturo, dipingendo sull'intonaco fresco?", opzioni: ["Pittura a olio", "Mosaico", "Affresco", "Tempera all'uovo"], rispostaCorretta: 2, spiegazione: "Con l'affresco, asciugandosi, l'intonaco ingloba il pigmento facendolo diventare parte del muro stesso." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Qual è la caratteristica straordinaria della cupola del Pantheon a Roma?", opzioni: ["È interamente d'oro", "Ha un'apertura circolare in cima (oculo) e nessuna colonna di sostegno interna", "Gira su se stessa", "È fatta di vetro"], rispostaCorretta: 1, spiegazione: "L'Oculo di 9 metri illumina l'interno. La cupola sta in piedi da 2000 anni grazie a un geniale uso del calcestruzzo alleggerito." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Come venivano chiamati i grandi complessi pubblici romani dedicati ai bagni, al relax e all'esercizio fisico?", opzioni: ["Basiliche", "Fori", "Terme", "Anfiteatri"], rispostaCorretta: 2, spiegazione: "Le Terme (come quelle di Caracalla) avevano enormi vasche di acqua calda (Calidarium), tiepida (Tepidarium) e fredda (Frigidarium)." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Cosa si celebra nella scultura a spirale della Colonna Traiana?", opzioni: ["Le vittorie sportive alle Olimpiadi", "La vita degli dèi romani", "Le campagne militari dell'Imperatore Traiano per la conquista della Dacia", "La costruzione della città di Roma"], rispostaCorretta: 2, spiegazione: "È un racconto storico continuo inciso nel marmo, come un lunghissimo fumetto che si avvolge intorno alla colonna." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Quale materiale da costruzione innovativo fu inventato dai Romani, permettendo loro di creare volte e cupole enormi?", opzioni: ["Il cemento armato", "Il calcestruzzo (o opus caementicium)", "Il mattone refrattario", "Il plexiglass"], rispostaCorretta: 1, spiegazione: "Mescolando malta, pietrisco, sabbia vulcanica e acqua, ottenevano un materiale che induriva diventando solido come la pietra." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Qual è la differenza principale tra la scultura greca e il 'ritratto romano'?", opzioni: ["I romani scolpivano solo animali", "I greci cercavano la perfezione ideale, i romani il realismo severo con tutti i difetti (rughe, calvizie)", "I romani non facevano sculture", "I greci facevano solo sculture di bronzo"], rispostaCorretta: 1, spiegazione: "Il ritratto romano doveva essere fedele al volto del defunto o del politico, per tramandarne l'esatta memoria familiare e l'autorevolezza." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Che cos'era il Foro in una città romana?", opzioni: ["Il cimitero fuori le mura", "La grande piazza centrale, cuore religioso, politico e commerciale", "L'edificio per i bagni", "Il muro di difesa"], rispostaCorretta: 1, spiegazione: "Il Foro era l'equivalente dell'Agorà greca, ed era circondato da templi, basiliche e botteghe." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Con quale nome è meglio conosciuto l'Anfiteatro Flavio a Roma, usato per i giochi gladiatori?", opzioni: ["Circo Massimo", "Pantheon", "Colosseo", "Foro Romano"], rispostaCorretta: 2, spiegazione: "Prese il nome 'Colosseo' nel Medioevo a causa di una statua colossale di Nerone che si trovava un tempo lì vicino." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Quale tecnica decorativa, fatta accostando migliaia di piccoli cubetti di pietra o pasta vitrea (tessere), fu molto amata dai Romani per i pavimenti?", opzioni: ["Acquarello", "Mosaico", "Incisione", "Arazzo"], rispostaCorretta: 1, spiegazione: "I mosaici romani resistevano all'usura e potevano raffigurare scene complesse o motivi geometrici spettacolari." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Prolungando un arco a tutto sesto in profondità, quale struttura di copertura si ottiene?", opzioni: ["La volta a crociera", "La cupola", "La volta a botte", "Il tetto a spiovente"], rispostaCorretta: 2, spiegazione: "La volta a botte sembra un mezzo cilindro tagliato a metà ed è utilissima per coprire lunghi corridoi o navate." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Incrociando due volte a botte perpendicolarmente, cosa si ottiene?", opzioni: ["Una volta a crociera", "Una cupola", "Un arco acuto", "Un pilastro"], rispostaCorretta: 0, spiegazione: "La volta a crociera concentra il peso sui quattro angoli, permettendo di aprire grandi finestre sui lati." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Come si chiamava la casa cittadina abitata dalle ricche famiglie romane (patrizi)?", opzioni: ["Insula", "Domus", "Villa", "Castrum"], rispostaCorretta: 1, spiegazione: "La Domus era chiusa verso l'esterno ma aperta all'interno, sviluppandosi attorno all'atrio centrale dove si raccoglieva l'acqua piovana." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Cosa raffigurano i celebri affreschi rimasti intatti nella Villa dei Misteri a Pompei?", opzioni: ["Scene del senato romano", "Riti segreti e danze dedicati al dio Bacco (Dioniso)", "Battaglie navali", "Costellazioni e mappe"], rispostaCorretta: 1, spiegazione: "Pompei fu sepolta dalla cenere del Vesuvio nel 79 d.C., sigillando e conservando perfettamente questi colori brillanti, tra cui il famoso 'rosso pompeiano'." },
            { argomento: "Arte Romana", colore: "rosso", domanda: "Che cos'è un Acquedotto romano?", opzioni: ["Una conduttura fognaria", "Un ponte ad arcate che trasportava l'acqua sorgiva in pendenza fino alle città", "Una vasca termale", "Un porto navale"], rispostaCorretta: 1, spiegazione: "Capolavori di ingegneria, gli acquedotti (come il Pont du Gard in Francia) garantivano l'igiene e l'approvvigionamento di fontane e terme." }
        ];

        let squadre = [];
        let turnoAttuale = 0;
        let domandaAttuale;

        // Nuove variabili per Timer e Punteggio Obiettivo
        let timerInterval;
        const TEMPO_LIMITE = 60;
        let tempoRimasto = TEMPO_LIMITE;
        const PUNTEGGIO_VITTORIA = 13;
        let giocoFinito = false;

        const schermataIniziale = document.getElementById("schermata-iniziale");
        const quizContainer = document.getElementById("quiz-container");
        const tabellone = document.getElementById("tabellone");
        const indicatoreTurno = document.getElementById("indicatore-turno");
        const titoloArgomento = document.getElementById("argomento-titolo");
        const testoDomanda = document.getElementById("testo-domanda");
        const contenitorePulsanti = document.getElementById("pulsanti-opzioni");
        const areaFeedback = document.getElementById("feedback");
        const btnAvanti = document.getElementById("btn-avanti");
        const countdownEl = document.getElementById("countdown");
        const timerContainer = document.getElementById("timer-container");

        function iniziaGioco() {
            const numeroSelezionato = parseInt(document.getElementById("numero-squadre").value);
            
            squadre = [];
            for (let i = 1; i <= numeroSelezionato; i++) {
                squadre.push({ nome: "Squadra " + i, punteggio: 0 });
            }
            
            turnoAttuale = 0;
            giocoFinito = false;
            schermataIniziale.style.display = "none";
            quizContainer.style.display = "block";
            btnAvanti.innerText = "Prossima Domanda ➔";
            
            aggiornaInterfaccia();
            pescaDomandaCasuale();
        }

        function aggiornaInterfaccia() {
            tabellone.innerHTML = "";
            squadre.forEach((squadra, index) => {
                const badge = document.createElement("div");
                badge.className = "squadra-score";
                if (index === turnoAttuale) {
                    badge.classList.add("squadra-attiva");
                }
                badge.innerText = `${squadra.nome}: ${squadra.punteggio} / ${PUNTEGGIO_VITTORIA}`;
                tabellone.appendChild(badge);
            });

            indicatoreTurno.innerText = "Tocca alla " + squadre[turnoAttuale].nome;
        }

        function pescaDomandaCasuale() {
            timerContainer.style.display = "inline-block";
            const indiceCasuale = Math.floor(Math.random() * databaseDomande.length);
            domandaAttuale = databaseDomande[indiceCasuale];
            
            titoloArgomento.innerText = "Categoria: " + domandaAttuale.argomento;
            titoloArgomento.style.backgroundColor = codiciColori[domandaAttuale.colore];
            
            testoDomanda.innerText = domandaAttuale.domanda;
            
            contenitorePulsanti.innerHTML = "";
            areaFeedback.style.display = "none";
            btnAvanti.style.display = "none"; 

            domandaAttuale.opzioni.forEach((opzione, index) => {
                const bottone = document.createElement("button");
                bottone.innerText = opzione;
                bottone.classList.add("btn-opzione");
                bottone.onclick = () => verificaRisposta(index, domandaAttuale.rispostaCorretta, domandaAttuale.spiegazione);
                contenitorePulsanti.appendChild(bottone);
            });

            avviaTimer();
        }

        // Funzione per far partire il countdown
        function avviaTimer() {
            clearInterval(timerInterval);
            tempoRimasto = TEMPO_LIMITE;
            countdownEl.innerText = tempoRimasto;
            
            timerInterval = setInterval(() => {
                tempoRimasto--;
                countdownEl.innerText = tempoRimasto;
                
                if (tempoRimasto <= 0) {
                    clearInterval(timerInterval);
                    gestisciTempoScaduto();
                }
            }, 1000);
        }

        // Gestione dell'errore per tempo scaduto
        function gestisciTempoScaduto() {
            areaFeedback.style.display = "block";
            btnAvanti.style.display = "inline-block"; 
            
            const tuttiIPulsanti = document.querySelectorAll(".btn-opzione");
            tuttiIPulsanti.forEach(btn => btn.disabled = true);

            areaFeedback.innerText = "⏱️ Tempo Scaduto!\n\n" + domandaAttuale.spiegazione;
            areaFeedback.className = "errato";
        }

        function verificaRisposta(indiceScelto, indiceCorretto, spiegazione) {
            clearInterval(timerInterval); // Blocca il timer appena viene data una risposta
            
            areaFeedback.style.display = "block";
            
            const tuttiIPulsanti = document.querySelectorAll(".btn-opzione");
            tuttiIPulsanti.forEach(btn => btn.disabled = true);

            if (indiceScelto === indiceCorretto) {
                areaFeedback.innerText = "Esatto! 🎉\n\n" + spiegazione;
                areaFeedback.className = "corretto";
                
                squadre[turnoAttuale].punteggio++;
                aggiornaInterfaccia(); 
                
                // Controllo se la squadra attuale ha raggiunto 13 punti
                if (squadre[turnoAttuale].punteggio >= PUNTEGGIO_VITTORIA) {
                    mostraVittoria(squadre[turnoAttuale].nome);
                    return;
                }
            } else {
                areaFeedback.innerText = "Sbagliato! 😔\n\n" + spiegazione;
                areaFeedback.className = "errato";
            }
            
            btnAvanti.style.display = "inline-block"; 
        }

        // Schermata di fine gioco
        function mostraVittoria(nomeSquadra) {
            giocoFinito = true;
            timerContainer.style.display = "none";
            testoDomanda.innerText = `🏆 FINE PARTITA 🏆`;
            contenitorePulsanti.innerHTML = `<h2 style="color: #2c3e50; margin: 20px 0;">La <span style="color: #e74c3c;">${nomeSquadra}</span> vince la partita raggiungendo ${PUNTEGGIO_VITTORIA} punti! 🎉</h2>`;
            btnAvanti.innerText = "Ricomincia Partita 🔄";
            btnAvanti.style.display = "inline-block";
        }

        function prossimoTurno() {
            if (giocoFinito) {
                // Se il gioco è finito, premendo il pulsante si torna alla selezione iniziale
                schermataIniziale.style.display = "block";
                quizContainer.style.display = "none";
                return;
            }
            turnoAttuale = (turnoAttuale + 1) % squadre.length;
            aggiornaInterfaccia();
            pescaDomandaCasuale();
        }
    </script>
</body>
</html>
