<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triviart - Il Gioco dell'Arte</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --accent-color: #e74c3c;
            --background-color: #f5f7fa;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        /* Tabellone Punteggi */
        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: #edf2f7;
            padding: 15px;
            border-radius: 10px;
        }

        .team-card {
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .team-card.active {
            background-color: var(--primary-color);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .team-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .team-score {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Timer */
        .timer-container {
            font-size: 1.5rem;
            margin: 15px 0;
            font-weight: bold;
        }

        #timer {
            color: var(--accent-color);
            font-size: 2rem;
            display: inline-block;
            min-width: 50px;
        }

        /* Area Domanda */
        .question-box {
            font-size: 1.3rem;
            margin: 25px 0;
            min-height: 60px;
            font-weight: 600;
            padding: 0 10px;
        }

        /* Bottoni Risposte */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn-answer {
            background-color: white;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
        }

        .btn-answer:hover:not(:disabled) {
            background-color: #f7fafc;
            border-color: var(--primary-color);
        }

        .btn-answer:active:not(:disabled) {
            transform: scale(0.98);
        }

        /* Schermata di Vittoria */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .win-screen h2 {
            font-size: 2.5rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .btn-restart {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .btn-restart:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="game-screen" class="screen active">
            <h1>Triviart</h1>
            
            <div class="scoreboard">
                <div id="team-0-card" class="team-card active">
                    <div class="team-name">Squadra Blu</div>
                    <div id="team-0-score" class="team-score">0</div>
                </div>
                <div id="team-1-card" class="team-card">
                    <div class="team-name">Squadra Rossa</div>
                    <div id="team-1-score" class="team-score">0</div>
                </div>
            </div>

            <div class="timer-container">
                Tempo rimasto: <span id="timer">60</span>s
            </div>

            <div id="question" class="question-box">Caricamento domanda...</div>

            <div id="answers" class="answers-grid">
                </div>
        </div>

        <div id="win-screen" class="screen win-screen">
            <h2>🏆 Vittoria!</h2>
            <p id="win-message" style="font-size: 1.4rem;"></p>
            <button class="btn-restart" onclick="riavviaGioco()">Gioca Ancora</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE DEL GIOCO
        const TEMPO_MASSIMO = 60;
        const PUNTEGGIO_VITTORIA = 13;

        // Database delle domande (Espandibile a piacimento)
        const databaseDomande = [
            {
                domanda: "Chi ha dipinto la celebre 'Gioconda'?",
                risposte: ["Michelangelo", "Leonardo da Vinci", "Raffaello", "Donatello"],
                corretta: 1
            },
            {
                domanda: "Quale movimento artistico esalta la velocità, la tecnologia e il futuro?",
                risposte: ["Impressionismo", "Romanticismo", "Futurismo", "Neoclassicismo"],
                corretta: 2
            },
            {
                domanda: "Chi è l'autore del dipinto 'La notte stellata'?",
                risposte: ["Vincent van Gogh", "Claude Monet", "Pablo Picasso", "Keith Haring"],
                corretta: 0
            },
            {
                domanda: "Quale stile architettonico e artistico è caratterizzato da archi a sesto acuto e grandi vetrate colorate?",
                risposte: ["Romanico", "Gotico", "Rinascimentale", "Barocco"],
                corretta: 1
            }
        ];

        // STATO DEL GIOCO
        let squadre = [
            { nome: "Squadra Blu", punteggio: 0 },
            { nome: "Squadra Rossa", punteggio: 0 }
        ];
        let indiceSquadraAttuale = 0;
        let domandeDisponibili = [];
        let domandaAttuale = null;
        let tempoRimanente = TEMPO_MASSIMO;
        let timerIntervallo = null;

        // INIZIALIZZAZIONE
        function iniziaGioco() {
            squadre = [
                { nome: "Squadra Blu", punteggio: 0 },
                { nome: "Squadra Rossa", punteggio: 0 }
            ];
            indiceSquadraAttuale = 0;
            domandeeDisponibili = [...databaseDomande];
            
            // Mescola le domande all'inizio della partita
            domandeDisponibili.sort(() => Math.random() - 0.5);

            aggiornaGraficaPunteggi();
            mostraSchermata("game-screen");
            caricaProssimaDomanda();
        }

        // FUNZIONI DI FLUSSO
        function caricaProssimaDomanda() {
            if (domandeDisponibili.length === 0) {
                // Se le domande finiscono, ricarica il pool per non bloccare il gioco
                domandeDisponibili = [...databaseDomande];
                domandeDisponibili.sort(() => Math.random() - 0.5);
            }

            domandaAttuale = domandeDisponibili.pop();
            
            // Rendering della domanda
            document.getElementById("question").innerText = domandaAttuale.domanda;
            
            // Rendering dei bottoni risposta
            const containerRisposte = document.getElementById("answers");
            containerRisposte.innerHTML = "";

            domandaAttuale.risposte.forEach((risposta, indice) => {
                const bottone = document.createElement("button");
                bottone.className = "btn-answer";
                bottone.innerText = risposta;
                bottone.onclick = () => controllaRisposta(indice);
                containerRisposte.appendChild(bottone);
            });

            // Evidenzia visivamente la squadra attiva
            document.getElementById("team-0-card").className = `team-card ${indiceSquadraAttuale === 0 ? 'active' : ''}`;
            document.getElementById("team-1-card").className = `team-card ${indiceSquadraAttuale === 1 ? 'active' : ''}`;

            avviaTimer();
        }

        // GESTIONE TIMER
        function avviaTimer() {
            tempoRimanente = TEMPO_MASSIMO;
            document.getElementById("timer").innerText = tempoRimanente;
            
            clearInterval(timerIntervallo);
            
            timerIntervallo = setInterval(() => {
                tempoRimanente--;
                document.getElementById("timer").innerText = tempoRimanente;

                if (tempoRimanente <= 0) {
                    clearInterval(timerIntervallo);
                    disabilitaBottoni();
                    alert(`Tempo scaduto per la ${squadre[indiceSquadraAttuale].nome}! Il turno passa alla squadra successiva.`);
                    passaTurno();
                }
            }, 1000);
        }

        // VERIFICA DELLA RISPOSTA
        function controllaRisposta(indiceScelto) {
            clearInterval(timerIntervallo);
            disabilitaBottoni();

            const bottoni = document.querySelectorAll(".btn-answer");

            if (indiceScelto === AppiattisciIndiceCorretto(domandaAttuale.corretta)) {
                // Risposta Corretta
                bottoni[indiceScelto].style.backgroundColor = "#2ecc71";
                bottoni[indiceScelto].style.color = "white";
                bottoni[indiceScelto].style.borderColor = "#2ecc71";
                
                squadre[indiceSquadraAttuale].punteggio += 1; // Assegna 1 punto
                aggiornaGraficaPunteggi();

                // Controllo immediato della vittoria a 13 punti
                if (squadre[indiceSquadraAttuale].punteggio >= PUNTEGGIO_VITTORIA) {
                    setTimeout(() => dichiaraVincitore(squadre[indiceSquadraAttuale]), 1000);
                    return;
                }
            } else {
                // Risposta Errata
                bottoni[indiceScelto].style.backgroundColor = "#e74c3c";
                bottoni[indiceScelto].style.color = "white";
                bottoni[indiceScelto].style.borderColor = "#e74c3c";
                
                // Mostra visivamente quella corretta
                bottoni[domandaAttuale.corretta].style.backgroundColor = "#2ecc71";
                bottoni[domandaAttuale.corretta].style.color = "white";
            }

            // Attendi un secondo per mostrare il feedback visivo prima di cambiare turno
            setTimeout(passaTurno, 1200);
        }

        function AppiattisciIndiceCorretto(valore) {
            return valore; // Funzione di utilità interna
        }

        function passaTurno() {
            // Cambia squadra (0 diventa 1, 1 diventa 0)
            indiceSquadraAttuale = (indiceSquadraAttuale + 1) % squadre.length;
            caricaProssimaDomanda();
        }

        // INTERFACCIA E UTILITY
        function disabilitaBottoni() {
            const bottoni = document.querySelectorAll(".btn-answer");
            bottoni.forEach(b => b.disabled = true);
        }

        function aggiornaGraficaPunteggi() {
            document.getElementById("team-0-score").innerText = squadre[0].punteggio;
            document.getElementById("team-1-score").innerText = squadre[1].punteggio;
        }

        function mostraSchermata(idSchermata) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(idSchermata).classList.add("active");
        }

        function dichiaraVincitore(squadra) {
            document.getElementById("win-message").innerHTML = `La <strong>${squadra.nome}</strong> ha raggiunto il traguardo dei ${PUNTEGGIO_VITTORIA} punti dominando la partita!`;
            mostraSchermata("win-screen");
        }

        function riavviaGioco() {
            iniziaGioco();
        }

        // Avvio automatico al caricamento della pagina
        window.onload = iniziaGioco;
    </script>
</body>
</html>
