<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriviArt - Classe Prima</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden; 
        }
        
        /* SCHERMATA INIZIALE */
        #schermata-iniziale h1 {
            color: #2c3e50;
            font-size: 1.8em;
            margin-bottom: 5px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        #schermata-iniziale h2 {
            color: #7f8c8d;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        /* LEGENDA ARGOMENTI INIZIALE */
        .titolo-legenda {
            font-size: 1em;
            color: #2c3e50;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .legenda-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .badge-categoria {
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* Colori dei badge per la legenda */
        .bg-marrone { background-color: #8d6e63; }
        .bg-giallo { background-color: #f1c40f; }
        .bg-verde { background-color: #2ecc71; }
        .bg-blu { background-color: #3498db; }
        .bg-arancione { background-color: #e67e22; }
        .bg-rosso { background-color: #e74c3c; }

        .selettore-squadre {
            margin: 20px 0;
            font-size: 1.1em;
        }
        .selettore-squadre select {
            font-size: 1em;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .btn-inizia {
            background-color: #e74c3c;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-inizia:hover { background-color: #c0392b; }

        /* TABELLONE PUNTEGGI */
        #tabellone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #bdc3c7;
        }
        .squadra-score {
            background-color: #ecf0f1;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        .squadra-attiva {
            background-color: #f1c40f; 
            color: #000;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* GIOCO */
        #quiz-container { display: none; padding-top: 0; }
        
        #indicatore-turno {
            font-size: 1.1em;
            color: #7f8c8d;
            font-weight: bold;
            margin: 20px 0 10px 0;
        }

        /* STILE DEL TIMER */
        #timer-container {
            font-size: 1.2em;
            font-weight: bold;
            color: #c0392b;
            margin: 10px 0 20px 0;
            padding: 5px 15px;
            background-color: #f9ebea;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #f5b7b1;
        }
        
        #argomento-titolo {
            font-size: 1.2em;
            margin: 0 -30px 20px -30px; 
            padding: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3); 
            transition: background-color 0.3s;
        }
        
        #testo-domanda {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: normal;
        }
        
        /* PULSANTI E FEEDBACK */
        .btn-opzione {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-opzione:hover { 
            background-color: #e0e6ed; 
            border-color: #95a5a6;
        }
        .btn-opzione:disabled {
            background-color: #ecf0f1;
            border-color: #ecf0f1;
            cursor: not-allowed;
            color: #95a5a6;
        }
        #feedback {
            margin-top: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            display: none;
            white-space: pre-line; 
        }
        .corretto { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .errato { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        #btn-avanti {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }
        #btn-avanti:hover { background-color: #1a252f; }
    </style>
</head>
<body>

    <div id="schermata-iniziale" class="container">
        <h1>Prof. Marco Cigolotti</h1>
        <h2>TriviArt - Classe 1</h2>
        
        <div class="titolo-legenda">Il percorso nel tempo:</div>
        <div class="legenda-container">
            <div class="badge-categoria bg-marrone">1. Preistoria</div>

        <div id="timer-container">Tempo rimasto: <span id="countdown">60</span>s</div>

        <h3 id="testo-domanda">Caricamento domanda...</h3>
        
        <div id="pulsanti-opzioni"></div>
        <div id="feedback"></div>
        
        <button id="btn-avanti" onclick="prossimoTurno()">Prossima Domanda ➔</button>
    </div>

    <script>

        const databaseDomande = [
          // --- 1. PREISTORIA (15 domande) ---

    { argomento: "Preistoria", colore: "marrone", domanda: "Cosa rappresentano le cosiddette 'Veneri preistoriche' (come la Venere di Willendorf)?", opzioni: ["La dea della bellezza", "La fertilità della donna e della terra", "Una regina del villaggio", "Una guerriera"], rispostaCorretta: 1, spiegazione: "Le forme esagerate (seno, ventre) simboleggiavano l'abbondanza, la fertilità e la continuazione della specie." },

    { argomento: "Preistoria", colore: "marrone", domanda: "In quale nazione si trova invece la grotta di Altamira, famosa per i bisonti dipinti sul soffitto?", opzioni: ["Spagna", "Inghilterra", "Grecia", "Portogallo"], rispostaCorretta: 0, spiegazione: "Altamira si trova nel nord della Spagna ed è stata una delle prime grotte preistoriche dipinte ad essere scoperta." },
    { argomento: "Preistoria", colore: "marrone", domanda: "Che cos'è un Dolmen?", opzioni: ["Un'arma da caccia", "Una collana di conchiglie", "Due pietre verticali sormontate da una grande lastra orizzontale", "Una statuetta femminile"], rispostaCorretta: 2, spiegazione: "Il Dolmen (dal bretone 'tavola di pietra') era usato principalmente come monumento funerario collettivo." },
    { argomento: "Preistoria", colore: "marrone", domanda: "Come si chiama un monumento megalitico formato da pietre disposte in cerchio, come il famoso Stonehenge?", opzioni: ["Mastaba", "Cromlech", "Ziqqurat", "Agorà"], rispostaCorretta: 1, spiegazione: "Il Cromlech era probabilmente un luogo sacro legato a culti solari o un antico osservatorio astronomico." },
    { argomento: "Preistoria", colore: "marrone", domanda: "Quale evento storico ed epocale segna convenzionalmente la fine della Preistoria?", opzioni: ["L'invenzione della ruota", "La scoperta dell'America", "L'invenzione della scrittura", "L'inizio delle ere glaciali"], rispostaCorretta: 2, spiegazione: "Con la scrittura (intorno al 3000 a.C.) l'uomo inizia a lasciare testimonianze e documenti storici decifrabili." },

    { argomento: "Preistoria", colore: "marrone", domanda: "Quale pietra, per la sua durezza e capacità di scheggiarsi in lame taglienti, era la più usata per armi e utensili?", opzioni: ["Il marmo", "Il granito", "La selce", "Il tufo"], rispostaCorretta: 2, spiegazione: "Lavorando la selce si ottenevano i 'chopper' e le 'amigdale', strumenti fondamentali per la sopravvivenza." },
    { argomento: "Preistoria", colore: "marrone", domanda: "Come si chiamano le antiche e misteriose torri di pietra a forma di tronco di cono, tipiche della Sardegna?", opzioni: ["Trulli", "Nuraghi", "Ziggurat", "Piramidi"], rispostaCorretta: 1, spiegazione: "I Nuraghi sono costruzioni megalitiche realizzate con grandi blocchi di pietra sovrapposti a secco (senza cemento)." },
    { argomento: "Preistoria", colore: "marrone", domanda: "Nelle pitture rupestri, come si realizzava spesso l'effetto 'in negativo' delle mani?", opzioni: ["Appoggiando la mano sporca di colore sulla parete", "Spruzzando il colore con la bocca attorno alla mano appoggiata alla roccia", "Scolpendo la roccia a forma di mano", "Usando uno stampo di legno"], rispostaCorretta: 1, spiegazione: "Questa tecnica, detta aerografia preistorica, lasciava l'impronta chiara della mano circondata dall'alone di colore." },

    // --- 2. MESOPOTAMIA (15 domande) ---
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Come si chiama la grande torre a gradoni tipica delle città sumere e babilonesi?", opzioni: ["Piramide", "Nuraghe", "Ziggurat", "Partenone"], rispostaCorretta: 2, spiegazione: "La Ziggurat era il centro religioso e magazzino della città; sulla sua sommità si trovava il tempio." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Con quale materiale i popoli mesopotamici costruivano i loro imponenti edifici?", opzioni: ["Grandi blocchi di marmo", "Mattoni di argilla (crudi o cotti)", "Cemento armato", "Legno di quercia"], rispostaCorretta: 1, spiegazione: "La Mesopotamia scarseggiava di pietra e legname, quindi sfruttavano l'argilla dei fiumi per creare i mattoni." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Cosa raffigura lo 'Stendardo di Ur'?", opzioni: ["Scene di pace e scene di guerra", "La mappa della città", "Il mito della creazione", "I pianeti del sistema solare"], rispostaCorretta: 0, spiegazione: "È un pannello in legno decorato con lapislazzuli e conchiglie che mostra i due aspetti principali della vita sumera." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Chi sono i Lamassu, posti a guardia dei palazzi assiri?", opzioni: ["Sacerdoti guerrieri", "Mostri marini", "Tori alati androcefali (con testa umana)", "Leoni di bronzo"], rispostaCorretta: 2, spiegazione: "Avevano funzione apotropaica (per tenere lontano il male) e mostravano la potenza invincibile del sovrano." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Di che colore era la splendida Porta di Ishtar a Babilonia?", opzioni: ["Bianca", "Rossa", "Blu brillante (per i mattoni smaltati)", "Oro massiccio"], rispostaCorretta: 2, spiegazione: "Era rivestita di mattoni smaltati color lapislazzuli, decorati con draghi e tori in rilievo." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Cosa significa letteralmente la parola 'Mesopotamia'?", opzioni: ["Terra del sole", "Terra in mezzo ai fiumi", "Montagna sacra", "Regno dei re"], rispostaCorretta: 1, spiegazione: "Deriva dal greco 'mésos' (in mezzo) e 'potamós' (fiume). Si riferisce al territorio tra il Tigri e l'Eufrate." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Quali sono i due grandi fiumi che bagnavano la Mesopotamia?", opzioni: ["Nilo e Gange", "Indo e Giallo", "Tigri ed Eufrate", "Tevere e Po"], rispostaCorretta: 2, spiegazione: "Questi due fiumi rendevano fertile la terra e fornivano l'argilla, fondamentale per l'arte e l'architettura mesopotamica." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale tipo di scrittura inventarono i Sumeri, incidendo tavolette di argilla fresca con uno stilo?", opzioni: ["Geroglifica", "Alfabetica", "Cuneiforme", "Lineare A"], rispostaCorretta: 2, spiegazione: "Si chiama cuneiforme perché i segni lasciati dallo stilo sull'argilla avevano la forma di piccoli chiodi o cunei." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Che cos'è la famosa Stele di Hammurabi?", opzioni: ["Una statua del dio Sole", "Un blocco di pietra nero su cui è inciso uno dei più antichi codici di leggi", "Una mappa militare", "Un altare per i sacrifici"], rispostaCorretta: 1, spiegazione: "Contiene le leggi del re babilonese Hammurabi (es. la legge del taglione: occhio per occhio, dente per dente)." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale leggendaria meraviglia del mondo antico si trovava a Babilonia?", opzioni: ["Il Colosso", "Il Faro", "La grande Piramide", "I Giardini Pensili"], rispostaCorretta: 3, spiegazione: "Fatti costruire, secondo la leggenda, dal re Nabucodonosor II, erano un capolavoro di ingegneria e idraulica." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale piccolo oggetto usavano i mesopotamici per 'firmare' i documenti o sigillare le merci rotolandolo sull'argilla?", opzioni: ["Un anello d'oro", "Un sigillo cilindrico", "Una moneta di rame", "Un timbro di legno"], rispostaCorretta: 1, spiegazione: "Rotolandolo sull'argilla fresca, il sigillo lasciava impresso un piccolo rilievo continuo con scene religiose o di vita quotidiana." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Nei bellissimi bassorilievi dei palazzi Assiri (come a Ninive), quali erano i due temi più rappresentati?", opzioni: ["L'agricoltura e la pesca", "La vita degli dèi e i miti", "La guerra e la caccia al leone", "Il commercio e le feste"], rispostaCorretta: 2, spiegazione: "Gli Assiri erano un popolo bellicoso; i rilievi servivano per terrorizzare i nemici ed esaltare la forza del re." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Di che materiale era fatta la statua del governatore sumero Gudea di Lagash?", opzioni: ["Diorite, una pietra scura e durissima", "Legno di cedro", "Terracotta dipinta", "Oro e argento"], rispostaCorretta: 0, spiegazione: "L'uso della diorite (difficile da scolpire) serviva a rendere la statua indistruttibile, sfidando il tempo e l'usura." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "In architettura, quale elemento tecnico fu perfezionato e usato ampiamente in Mesopotamia prima ancora che dai Romani?", opzioni: ["La cupola a bulbo", "L'arco a tutto sesto e la volta in mattoni", "Il colonnato di marmo", "La capriata in legno"], rispostaCorretta: 1, spiegazione: "Mancando lunghi tronchi di legno o grandi pietre per fare architravi, i mesopotamici usarono i mattoni per costruire archi e coprire gli spazi." },
    { argomento: "Mesopotamia", colore: "giallo", domanda: "Quale fondamentale invenzione, che rivoluzionò i trasporti e l'agricoltura, è attribuita ai Sumeri?", opzioni: ["La bussola", "La ruota", "L'aratro di ferro", "La sella per i cavalli"], rispostaCorretta: 1, spiegazione: "Inizialmente usata come tornio per la ceramica, la ruota venne poi applicata ai carri, cambiando per sempre la storia." }        ];
    ];
        let squadre = [];
        let turnoAttuale = 0;
        let domandaAttuale;

        // Nuove variabili per Timer e Punteggio Obiettivo
        let timerInterval;
        const TEMPO_LIMITE = 60;
        let tempoRimasto = TEMPO_LIMITE;
        const PUNTEGGIO_VITTORIA = 13;
        let giocoFinito = false;

        const schermataIniziale = document.getElementById("schermata-iniziale");
        const quizContainer = document.getElementById("quiz-container");
        const tabellone = document.getElementById("tabellone");
        const indicatoreTurno = document.getElementById("indicatore-turno");
        const titoloArgomento = document.getElementById("argomento-titolo");
        const testoDomanda = document.getElementById("testo-domanda");
        const contenitorePulsanti = document.getElementById("pulsanti-opzioni");
        const areaFeedback = document.getElementById("feedback");
        const btnAvanti = document.getElementById("btn-avanti");
        const countdownEl = document.getElementById("countdown");
        const timerContainer = document.getElementById("timer-container");

        function iniziaGioco() {
            const numeroSelezionato = parseInt(document.getElementById("numero-squadre").value);
            
            squadre = [];
            for (let i = 1; i <= numeroSelezionato; i++) {
                squadre.push({ nome: "Squadra " + i, punteggio: 0 });
            }
            
            turnoAttuale = 0;
            giocoFinito = false;
            schermataIniziale.style.display = "none";
            quizContainer.style.display = "block";
            btnAvanti.innerText = "Prossima Domanda ➔";
            
            aggiornaInterfaccia();
            pescaDomandaCasuale();
        }

        function aggiornaInterfaccia() {
            tabellone.innerHTML = "";
            squadre.forEach((squadra, index) => {
                const badge = document.createElement("div");
                badge.className = "squadra-score";
                if (index === turnoAttuale) {
                    badge.classList.add("squadra-attiva");
                }
                badge.innerText = `${squadra.nome}: ${squadra.punteggio} / ${PUNTEGGIO_VITTORIA}`;
                tabellone.appendChild(badge);
            });

            indicatoreTurno.innerText = "Tocca alla " + squadre[turnoAttuale].nome;
        }

        function pescaDomandaCasuale() {
            timerContainer.style.display = "inline-block";
            const indiceCasuale = Math.floor(Math.random() * databaseDomande.length);
            domandaAttuale = databaseDomande[indiceCasuale];
            
            titoloArgomento.innerText = "Categoria: " + domandaAttuale.argomento;
            titoloArgomento.style.backgroundColor = codiciColori[domandaAttuale.colore];
            
            testoDomanda.innerText = domandaAttuale.domanda;
            
            contenitorePulsanti.innerHTML = "";
            areaFeedback.style.display = "none";
            btnAvanti.style.display = "none"; 

            domandaAttuale.opzioni.forEach((opzione, index) => {
                const bottone = document.createElement("button");
                bottone.innerText = opzione;
                bottone.classList.add("btn-opzione");
                bottone.onclick = () => verificaRisposta(index, domandaAttuale.rispostaCorretta, domandaAttuale.spiegazione);
                contenitorePulsanti.appendChild(bottone);
            });

            avviaTimer();
        }

        // Funzione per far partire il countdown
        function avviaTimer() {
            clearInterval(timerInterval);
            tempoRimasto = TEMPO_LIMITE;
            countdownEl.innerText = tempoRimasto;
            
            timerInterval = setInterval(() => {
                tempoRimasto--;
                countdownEl.innerText = tempoRimasto;
                
                if (tempoRimasto <= 0) {
                    clearInterval(timerInterval);
                    gestisciTempoScaduto();
                }
            }, 1000);
        }

        // Gestione dell'errore per tempo scaduto
        function gestisciTempoScaduto() {
            areaFeedback.style.display = "block";
            btnAvanti.style.display = "inline-block"; 
            
            const tuttiIPulsanti = document.querySelectorAll(".btn-opzione");
            tuttiIPulsanti.forEach(btn => btn.disabled = true);

            areaFeedback.innerText = "⏱️ Tempo Scaduto!\n\n" + domandaAttuale.spiegazione;
            areaFeedback.className = "errato";
        }

        function verificaRisposta(indiceScelto, indiceCorretto, spiegazione) {
            clearInterval(timerInterval); // Blocca il timer appena viene data una risposta
            
            areaFeedback.style.display = "block";
            
            const tuttiIPulsanti = document.querySelectorAll(".btn-opzione");
            tuttiIPulsanti.forEach(btn => btn.disabled = true);

            if (indiceScelto === indiceCorretto) {
                areaFeedback.innerText = "Esatto! 🎉\n\n" + spiegazione;
                areaFeedback.className = "corretto";
                
                squadre[turnoAttuale].punteggio++;
                aggiornaInterfaccia(); 
                
                // Controllo se la squadra attuale ha raggiunto 13 punti
                if (squadre[turnoAttuale].punteggio >= PUNTEGGIO_VITTORIA) {
                    mostraVittoria(squadre[turnoAttuale].nome);
                    return;
                }
            } else {
                areaFeedback.innerText = "Sbagliato! 😔\n\n" + spiegazione;
                areaFeedback.className = "errato";
            }
            
            btnAvanti.style.display = "inline-block"; 
        }

        // Schermata di fine gioco
        function mostraVittoria(nomeSquadra) {
            giocoFinito = true;
            timerContainer.style.display = "none";
            testoDomanda.innerText = `🏆 FINE PARTITA 🏆`;
            contenitorePulsanti.innerHTML = `<h2 style="color: #2c3e50; margin: 20px 0;">La <span style="color: #e74c3c;">${nomeSquadra}</span> vince la partita raggiungendo ${PUNTEGGIO_VITTORIA} punti! 🎉</h2>`;
            btnAvanti.innerText = "Ricomincia Partita 🔄";
            btnAvanti.style.display = "inline-block";
        }

        function prossimoTurno() {
            if (giocoFinito) {
                // Se il gioco è finito, premendo il pulsante si torna alla selezione iniziale
                schermataIniziale.style.display = "block";
                quizContainer.style.display = "none";
                return;
            }
            turnoAttuale = (turnoAttuale + 1) % squadre.length;
            aggiornaInterfaccia();
            pescaDomandaCasuale();
        }
    </script>
</body>
</html>
